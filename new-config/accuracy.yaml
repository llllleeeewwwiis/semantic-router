version: v0.2

listeners:
  - name: "http_server"
    address: "0.0.0.0"
    port: 8899
    protocol: "http"

providers:
  models:
    - name: "qwen2.5:3b"
      endpoints:
        - name: "endpoint1"
          endpoint: "host.docker.internal:8002"
          protocol: "http"
          weight: 1
  default_model: "qwen2.5:3b"

# -------------------------
# SIGNALS（关键优化）
# -------------------------
signals:
  preferences:
    - name: "pref_cs"
      description: "Computer science theory, algorithms, data structures, complexity, and systems."
      examples:
            # ===== Machine Learning / AI =====
            - "What is the learning rate in gradient descent?"
            - "Explain the Expectation-Maximization algorithm."
            - "Is log sigma(x) concave or convex?"
            - "Is ReLU a convex function?"
            - "What is MAP estimation?"
            - "What is maximum likelihood estimation?"

            # ===== Probabilistic / Graphical Models =====
            - "How to factorize joint probability P(A, B, C)?"
            - "What is conditional probability P(A|B)?"
            - "Explain Bayesian networks."
            - "What is independence in probability?"
            - "How to compute joint distributions?"

            # ===== Programming Languages / Syntax =====
            - "How does a conditional branch work in APL?"
            - "What is the syntax of a loop in FORTRAN?"
            - "Explain array indexing in programming languages."
            - "What is a compiler?"
            - "What is the difference between syntax and semantics?"

            # ===== Systems / Networking =====
            - "What is the use of Wireshark?"
            - "What does netstat do?"
            - "What is traceroute used for?"
            - "What is DNS lookup?"
            - "What is TCP dump?"

            # ===== Program Analysis / Execution =====
            - "What should a program do if a constraint is unsatisfiable?"
            - "How to handle symbolic execution failure?"
            - "What is constraint solving in programs?"
      threshold: 0.50

    - name: "pref_stem"
      description: "Mathematics, physics, and engineering calculations and principles."
      examples:
            - "Solve for x: 2x^2 + 5x - 3 = 0."
            - "What is the derivative of sin(x)?"
            - "State Newton's second law."
            - "What is Ohm's law?"
            - "Calculate the integral of x^2."
            - "What is the Pythagorean theorem?"
            - "Define velocity and acceleration."
            - "What is kinetic energy?"
            - "Explain the law of conservation of energy."
            - "What is the formula for force?"
            - "What is the Laplace transform?"
            - "Solve a system of linear equations."
            - "What is a vector space?"
            - "Explain torque in physics."
            - "What is resonance in circuits?"
      threshold: 0.50

    - name: "pref_science"
      description: "Biology, chemistry, and health sciences."
      examples:
            - "What is DNA replication?"
            - "What is photosynthesis?"
            - "What is the function of mitochondria?"
            - "What is an enzyme?"
            - "What is the pH scale?"
            - "What is the structure of an atom?"
            - "Define oxidation and reduction."
            - "What is a chemical bond?"
            - "What is the immune system?"
            - "What causes genetic mutations?"
            - "What is a protein?"
            - "What is a cell membrane?"
            - "Explain natural selection."
            - "What is the periodic table?"
            - "What is an antibiotic?"
      threshold: 0.50

    - name: "pref_business"
      description: "Economics, finance, and business strategy."
      examples:
            - "What is supply and demand?"
            - "Define opportunity cost."
            - "What is inflation?"
            - "What is GDP?"
            - "Explain marginal utility."
            - "What is fiscal policy?"
            - "What is monetary policy?"
            - "What is elasticity in economics?"
            - "What is a monopoly?"
            - "What is a balance sheet?"
            - "Define market equilibrium."
            - "What is profit maximization?"
            - "What is cost-benefit analysis?"
            - "What is a recession?"
            - "What is an investment portfolio?"
      threshold: 0.50

    - name: "pref_humanities"
      description: "History, law, philosophy, and psychology."
      examples:
            - "When did World War II end?"
            - "Who was the first president of the United States?"
            - "What is the definition of negligence in law?"
            - "What is cognitive dissonance?"
            - "Who wrote the Republic?"
            - "What is the meaning of utilitarianism?"
            - "What is the Magna Carta?"
            - "What is the legal definition of contract?"
            - "What is the French Revolution?"
            - "What is behavioral psychology?"
            - "Who was Napoleon?"
            - "What is ethics?"
            - "What is a constitution?"
            - "What is social identity theory?"
            - "What is jurisprudence?"
      threshold: 0.50

# -------------------------
# DECISIONS（核心优化）
# -------------------------
decisions:

  # ===== 1. CS（重写，修复 0% recall）=====
  - name: "route_cs"
    description: "Route to CS expert model for queries about computer science concepts, algorithms, data structures, and complexity."
    priority: 200
    rules:
      operator: "OR"
      conditions:
        - type: "preference"
          name: "pref_cs"

    modelRefs:
      - model: "qwen2.5:3b"

    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are a computer science expert. Focus on precise definitions, algorithms, and complexity."

  # ===== 2. STEM =====
  - name: "route_stem"
    description: "Route to STEM expert model for queries about mathematics, physics, engineering, and scientific calculations."
    priority: 180
    rules:
      operator: "OR"
      conditions:
        - type: "preference"
          name: "pref_stem"

    modelRefs:
      - model: "qwen2.5:3b"

    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are a STEM expert. Use formulas and step-by-step reasoning."

  # ===== 3. SCIENCE（生化医）=====
  - name: "route_science"
    description: "Route to science expert model for queries about biology, chemistry, and health sciences."
    priority: 170
    rules:
      operator: "OR"
      conditions:
        - type: "preference"
          name: "pref_science"

    modelRefs:
      - model: "qwen2.5:3b"

    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are a life science expert. Focus on biological and chemical accuracy."

  # ===== 4. BUSINESS =====
  - name: "route_business"
    description: "Route to business expert model for queries about economics, finance, and business strategy."
    priority: 170
    rules:
      operator: "OR"
      conditions:
        - type: "preference"
          name: "pref_business"

    modelRefs:
      - model: "qwen2.5:3b"

    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are a business expert. Focus on economic reasoning and market principles."

  # ===== 5. HUMANITIES（重写为 factual）=====
  - name: "route_humanities"
    description: "Route to humanities expert model for queries about history, law, philosophy, and psychology."
    priority: 170
    rules:
      operator: "OR"
      conditions:
        - type: "preference"
          name: "pref_humanities"

    modelRefs:
      - model: "qwen2.5:3b"

    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are a humanities expert. Provide clear and context-aware explanations."

  # ===== 6. DEFAULT（关键修复：无条件）=====
  - name: "default-route"
    description: "Default routing for general queries" # 补齐必填项
    priority: 0
    rules:
      operator: "OR"
      conditions: []   # ✅ 空条件 = 永远可匹配（最低优先级）
    modelRefs:
      - model: "qwen2.5:3b"
    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are a helpful general AI assistant. Clarify ambiguous queries when needed."