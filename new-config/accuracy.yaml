version: v0.2

listeners:
  - name: "http_server"
    address: "0.0.0.0"
    port: 8899
    protocol: "http"

providers:
  models:
    - name: "qwen2.5:3b"
      endpoints:
        - name: "endpoint1"
          endpoint: "host.docker.internal:8002"
          protocol: "http"
          weight: 1
  default_model: "qwen2.5:3b"

signals:
  preferences:
    - name: "pref_stem"
      description: "Mathematical proofs, physics principles, and structural engineering mechanics."
    - name: "pref_cs"
      description: "Programming, software development, algorithms, and technical infrastructure."
    - name: "pref_science"
      description: "Biological systems, chemical reactions, and clinical health topics."
    - name: "pref_humanities"
      description: "Legal analysis, historical events, philosophy, and psychological behavior."
    - name: "pref_business"
      description: "Micro/Macro economics, business strategy, and financial markets."
    - name: "pref_general"
      description: "General queries that do not fit other preferences"

decisions:
  # --- 1. CS 路由 (核心修复) ---
  - name: "route_cs"
    description: "Catch all coding, debugging, and systems architecture queries"
    priority: 180 # 提升优先级，确保先拦截技术咨询
    rules:
      operator: "OR"
      conditions:
        - type: "preference"
          name: "pref_cs"
          examples:
            - "How to fix a NullPointerException in Java?"
            - "Write a Python function to sort a list of dictionaries."
            - "Explain the difference between TCP and UDP."
            - "What is a Docker container and how does it work?"
            - "Explain the time complexity of a recursive binary search."
            - "How to manage KV cache in large language model serving?"
          threshold: 0.65 # 从 0.75 大幅下调，提升 Recall
    modelRefs:
      - model: "qwen2.5:3b"
    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are an expert coder. Write clean, efficient code and explain logic clearly."

  # --- 2. STEM 路由 ---
  - name: "route_stem"
    description: "Hard sciences requiring rigorous calculation"
    priority: 160
    rules:
      operator: "OR"
      conditions:
        - type: "preference"
          name: "pref_stem"
          examples:
            - "Solve for x: 2x^2 + 5x - 3 = 0."
            - "What is the second law of thermodynamics?"
            - "Calculate the derivative of ln(x) * e^x."
            - "Explain the Bernoulli principle in fluid mechanics."
            - "What is the resonance frequency of an RLC circuit?"
          threshold: 0.68 # 略微下调，增强对 Engineering 的覆盖
    modelRefs:
      - model: "qwen2.5:3b"
    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are a STEM expert. Focus on formulas, step-by-step reasoning, and LaTeX formatting."

  # --- 3. 商科路由 (精准打击) ---
  - name: "route_business"
    description: "Economics and corporate management"
    priority: 160
    rules:
      operator: "OR"
      conditions:
        - type: "preference"
          name: "pref_business"
          examples:
            - "What is the law of diminishing marginal utility?"
            - "Explain the difference between fiscal policy and monetary policy."
            - "How to conduct a PESTEL analysis for a new market entry?"
            - "Explain the concept of opportunity cost with an example."
            - "Analyze the supply and demand curve shifts under inflation."
          threshold: 0.68 # 从 0.72 下调，防止流入 Humanities
    modelRefs:
      - model: "qwen2.5:3b"
    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are a business and economics consultant. Use market logic and statistical intuition."

  # --- 4. 人文社科路由 ---
  - name: "route_humanities"
    description: "Textual and behavioral analysis"
    priority: 160
    rules:
      operator: "OR"
      conditions:
        - type: "preference"
          name: "pref_humanities"
          examples:
            - "What were the consequences of the 19th amendment?" # Law/History
            - "Discuss the concept of 'Utilitarianism' in ethics." # Philosophy
            - "How does cognitive dissonance affect consumer behavior?" # Psychology
            - "Analyze the theme of justice in Plato's Republic." # Philosophy
            - "What is the legal definition of intellectual property?" # Law
          threshold: 0.70 # 保持相对适中的阈值
    modelRefs:
      - model: "qwen2.5:3b"
    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are a humanities scholar. Provide deep contextual analysis and nuanced reasoning."

  # --- 5. 生命科学路由 (收紧控制) ---
  - name: "route_science"
    description: "Biological and chemical domain knowledge"
    priority: 160
    rules:
      operator: "OR"
      conditions:
        - type: "preference"
          name: "pref_science"
          examples:
            - "Explain the process of DNA replication."
            - "What is the chemical formula for photosynthesis?"
            - "What are the common side effects of antibiotics?"
            - "How do enzymes lower activation energy?"
            - "Describe the difference between mitosis and meiosis."
          threshold: 0.74 # 调高阈值 (原 0.70)，减少其他分类的误入（降低 FP）
    modelRefs:
      - model: "qwen2.5:3b"
    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are a life science expert. Focus on biological accuracy and chemical properties."

  # --- 6. 默认路由 (Fallback) ---
  - name: "default-route"
    description: "Fallback for general or ambiguous queries"
    priority: 50
    rules:
      operator: "OR"
      conditions:
        - type: "preference"
          name: "pref_general"
    modelRefs:
      - model: "qwen2.5:3b"
    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are a helpful general-purpose AI. If the query is ambiguous, ask for clarification."