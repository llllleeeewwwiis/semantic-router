providers:
  models:
    - name: "qwen2.5:3b"
      endpoints:
        - name: "endpoint1"
          endpoint: "host.docker.internal:8002"
          protocol: "http"
          weight: 1
      default_model: "qwen2.5:3b"
  default_model: "qwen2.5:3b"

signals:
  keywords:
    - name: "kw_psychology"
      operator: "OR"
      keywords:
        - cognition
        - cognitive
        - behavior
        - behavioural
        - perception
        - memory
        - emotion
        - motivation
        - personality
        - bias
        - heuristic
        - conditioning
        - learning
        - reinforcement
        - stimulus
        - response
        - anxiety
        - depression
        - therapy
        - disorder
        - Freud
        - Piaget
        - dopamine
        - serotonin
        - subconscious
      case_sensitive: false

    - name: "kw_computer_science"
      operator: "OR"
      keywords:
        - algorithm
        - algorithms
        - data
        - structure
        - array
        - list
        - stack
        - queue
        - tree
        - graph
        - recursion
        - iteration
        - complexity
        - runtime
        - memory
        - pointer
        - compiler
        - interpreter
        - thread
        - process
        - concurrency
        - database
        - sql
        - query
        - index
        - hash
        - network
        - protocol
        - tcp
        - api
        - backend
        - frontend
        - python
        - java
        - c++
        - javascript
        - debugging
        - bug
        - code
      case_sensitive: false

  preferences:
    - name: "pref_stem"
      description: "Quantitative STEM problem solving involving mathematics, physics, or engineering. This domain centers on formal quantitative reasoning, symbolic manipulation, and model-based analysis using mathematical structures and physical principles, including continuous and discrete mathematics, calculus and differential equations, linear algebra, probability and statistics, as well as classical and modern physics concepts such as kinematics, dynamics, energy, fields, and waves, together with engineering formulations that translate real-world systems into solvable mathematical models through assumptions, constraints, units, and dimensional analysis, emphasizing derivations, stepwise solution procedures, numerical methods, and the interpretation of results within theoretical frameworks."
      threshold: 0.3
      examples:
          - Solve the integral of x squared from 0 to 1
          - Find the derivative of sin(x) times e to the power x
          - Calculate the probability of drawing two aces from a deck without replacement
          - A block slides down an inclined plane with friction, find the acceleration
          - Compute the electric field generated by a point charge at a distance r
          - Determine the stress on a beam under a uniformly distributed load

    - name: "pref_cs"
      description: "Computer science and programming tasks involving algorithms, data structures, coding, or systems. This domain focuses on computational thinking and the design, analysis, and implementation of software and systems, covering algorithmic strategies, data organization and access patterns, complexity analysis, programming paradigms, language semantics, compilation and execution models, operating system abstractions, concurrency and synchronization, networking protocols, database theory and query processing, as well as software engineering practices, correctness, testing, and debugging, with an emphasis on precise logic, state transitions, and performance characteristics of code and systems."
      threshold: 0.3
      examples:
          - What is the time complexity of quicksort in the worst case
          - Explain how a binary search tree insertion works
          - Write a Python function to reverse a linked list
          - What is the difference between processes and threads in an operating system
          - How does a hash table handle collisions
          - Explain the CAP theorem in distributed systems

    - name: "pref_science"
      description: "Natural science questions in biology, chemistry, or health. This domain encompasses the study of living systems and chemical processes through empirical observation and mechanistic explanation, including molecular and cellular biology, genetics, physiology, ecology, biochemical pathways, as well as chemical structure, bonding, thermodynamics, kinetics, and equilibrium, together with health-related topics such as pathology, pharmacology, and public health, emphasizing causal mechanisms, experimental evidence, quantitative relationships, and the integration of concepts across scales from molecules to organisms and populations."
      threshold: 0.3
      examples:
          - What is the function of mitochondria in a cell
          - Explain how natural selection leads to evolution
          - What happens during the Krebs cycle
          - Calculate the pH of a solution with hydrogen ion concentration 1e-3
          - Describe the structure of a DNA molecule
          - How do antibiotics affect bacterial cells

    - name: "pref_humanities"
      description: "Humanities and social sciences including history, law, philosophy, and psychology. This domain involves interpretive and analytical reasoning about human thought, behavior, institutions, and culture, including historical analysis of events and causation, legal principles and reasoning, philosophical inquiry into ethics, knowledge, and logic, and psychological theories of cognition, emotion, and behavior, emphasizing argumentation, conceptual clarity, contextual understanding, textual interpretation, and the synthesis of perspectives across time and disciplines."
      threshold: 0.5
      examples:
          - What were the main causes of World War I
          - Explain the concept of utilitarianism in philosophy
          - How does cognitive dissonance affect decision making
          - What is the significance of the Magna Carta in legal history
          - Compare the ideas of Plato and Aristotle on ethics
          - What is the role of precedent in common law systems

    - name: "pref_business"
      description: "Economics and business topics including markets, supply and demand, finance, accounting, incentives, firms, and strategy. This domain focuses on decision-making under constraints and the allocation of resources within markets and organizations, covering microeconomic and macroeconomic frameworks, pricing and competition, incentives and game-theoretic interactions, financial analysis and valuation, accounting principles and reporting, operations and organizational behavior, and strategic management, emphasizing trade-offs, optimization, equilibrium reasoning, and the evaluation of outcomes using quantitative and qualitative metrics."
      threshold: 0.5
      examples:
          - What happens to demand when price increases
          - Explain the concept of opportunity cost with an example
          - How does inflation affect purchasing power
          - What is the difference between fixed cost and variable cost
          - Explain how a monopoly maximizes profit
          - What factors influence exchange rates in international markets


decisions:
  - name: "route_stem"
    description: "Route math, physics, and engineering questions to a STEM reasoning model."
    priority: 160
    rules:
      operator: "AND"
      conditions:
        - type: "preference"
          name: "pref_stem"
    modelRefs:
      - model: "qwen2.5:3b"
    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are an expert in mathematics, physics, and engineering. Solve the problem carefully and reason step by step."

  - name: "route_cs"
    description: "Route computer science questions to a coding or algorithm-focused model."
    priority: 200
    rules:
      operator: "OR"
      conditions:
        - type: "preference"
          name: "pref_cs"
        - type: "keyword"
          name: "kw_computer_science"
    modelRefs:
      - model: "qwen2.5:3b"
    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are a computer science expert. Focus on algorithms, systems, and precise technical reasoning."

  - name: "route_science"
    description: "Route biology, chemistry, and health questions to a science-focused model."
    priority: 155
    rules:
      operator: "AND"
      conditions:
        - type: "preference"
          name: "pref_science"
    modelRefs:
      - model: "qwen2.5:3b"
    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are a science specialist in biology, chemistry, and health. Give accurate scientific reasoning and use domain knowledge carefully."

  - name: "route_humanities"
    description: "Route law, history, philosophy, and psychology questions to a language-understanding model."
    priority: 150
    rules:
      operator: "OR"
      conditions:
        - type: "preference"
          name: "pref_humanities"     
        - type: "keyword"
          name: "kw_psychology"
    modelRefs:
      - model: "qwen2.5:3b"
    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are an expert in law, history, philosophy, and psychology. Interpret concepts carefully and justify the answer clearly."

  - name: "route_business"
    description: "Route economics and business questions to a general reasoning model."
    priority: 145
    rules:
      operator: "AND"
      conditions:
        - type: "preference"
          name: "pref_business"
    modelRefs:
      - model: "qwen2.5:3b"
    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are an expert in economics and business analysis. Reason clearly about incentives, markets, finance, and strategy."

  - name: "default-route"
    description: "Fallback route for queries that do not strongly match a subject group."
    priority: 50
    rules:
      operator: "OR"
      conditions: []
    modelRefs:
      - model: "qwen2.5:3b"
    plugins:
      - type: "system_prompt"
        configuration:
          system_prompt: "You are a general-purpose AI assistant. Answer clearly and choose the best general reasoning strategy for the question."