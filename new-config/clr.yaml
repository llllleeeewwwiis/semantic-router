        - name: "nvidia-nim"
          weight: 1
          endpoint: "integrate.api.nvidia.com"
          protocol: "https"

    - name: "google/gemma-3-27b-it"
      access_key: "your-access-key"
      endpoints:
        - name: "nvidia-nim"
          weight: 1
          endpoint: "integrate.api.nvidia.com"
          protocol: "https"

  default_model: "google/gemma-3-27b-it"